  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3i0046_WYG_002-1a, image: WYG0847/WYG0847-0697c.png}
body:
  text: 蟹譜卷下宋傅肱撰下篇孝報殊類貪化採捕泉比兵證貢評風蟲鬱洲食品恠狀斷弊蟹杯令㫖蟹戸兵權蟹征螺化食珍蟹浪酒蟹白蟹盪浦搖江紀賦詠孝報初杭俗嗜蟼蟇而鄙食蟹時有農夫田彦升者家於半道幼性至孝其母嗜蟹彦升慮其鄰比闚笑常遠市於蘇湖間熟之以布囊負歸俄而楊行密將田頵於倫切兵暴至鄉人皆竄避於山谷糧道不接或多餒死獨彦升挈囊負母竟以解免時人以為純孝之報焉殊類震澤漁者陸氏子舉網得蟹其大如斗以􅚺剪其網皆斷陸氏子怒欲烹之其侣老於漁者遽進曰不可吾嘗聞龜蟹之殊類甚者必江湖之使也烹之不祥乃從而釋之蟹至水面横行里許方没貪化神宗朝有大臣趙氏者名某雖於國功高然其性貪墨私門子弟苞苴上特優容之一日因錫宴上召伶官使諭已意伶者乃變易為十五郎姓旁因命釣者俄一人持竿而至遂於盤中引一蟹十五郎見而驚曰好手脚長我欲烹汝又念汝是同姓且釋汝翌日趙果出鎮近輔採捕今之採捕者於大江浦間承峻流環葦簾而障之其名曰斷音鍛於陂塘小溝港處則皆穴沮洳而居居人盤黒金作鈎狀置之竿首自探之夜則燃火以照咸附明而至焉若魚以餌而釣之泉比煎茶之法視其泉若蟹目然魚鱗然第一法兵證呉俗有蝦荒蟹亂之語葢取其被堅執鋭歲或暴至則鄉人用以為兵證也貢評國家貢口實於遠方者蛤蜊亦貢焉獨蟹不貢議者以為貢不貢固有差品予謂非也蛤蜊止生於海塗邇京州郡無有也故須上供旁蟹盛育於濟鄆商人輦負軌跡相繼所聚之多不減於江淮奚煩遠貢哉予嘗見監御厨王染院云御食經中亦有煑蟹法但不常御錫命則進耳非謂無録而不在貢品風蟲蟹之腹有風蟲狀如木鼈子而小色白大發風毒食者宜去之鬱洲江淛諸郡皆出蟹而蘇尤多蘇之五邑婁縣為美即崑山也婁縣之中生鬱洲呉塘者又特肥大鬱洲即孫恩所保之地食品北人以蟹生析之酤以鹽梅芼以椒橙盥手畢即可食目為洗手蟹恠狀呉沈氏子食蟹得背殻若鬼狀者眉目口鼻分布明白常寶翫之斷弊蟹至秋冬之交即自江順流而歸諸海蘇之人擇其江浦峻流處編簾以障之若犬牙焉致水不疾歸而歲常苦其患者有由然也雖州符遣卒俾令棄毁而吏民萬端終不可禁羅江東云蛟蜃之為害也則絶流不顧漁人之鈎網噫水之病呉久矣又非蛟蜃之比絶流顧網其才識固自有小大哉長民者能推而不疑亦豐歲一助也蟹杯其斗之大者匡一名斗漁人或用以酌酒謂之蟹杯亦訶陵雲螺之流也訶陵酒樽用鱟魚殻謂之澁鋒齾角内𤣥外黄松陵集海南人目螺之有文者曰雲螺亦用以酌酒令㫖藝祖時嘗遣使至江表宋齊丘送於郊次酒行語熟使者啟令曰須啗二物各取南北所尚復以二物仍互用南北俚語使者曰先喫鱣魚後喫旁蟹一似拈蛇弄蝎齊丘繼聲曰先喫乳酪後喫喬團一似噇膿灌血時朝廷方草創用度不給倚江表為外府故齊丘及之左右以令逼使之太甚相顧失色使者雅歎焉故歸朝而間行蟹户錢氏間置魚户蟹户專掌捕魚蟹若今台之藥户畦户睦之漆户比也兵權出師下砦之際忽見蟹則當呼為横行介士權以安衆蟹征按周禮􅈄人職掌漁征入於玉府者貴其鬚骨之用以飾器物也今魚雖鯤鮞以至蝦蟹悉立征税之目非若古人取鬚骨之意也二浙運使沈公立以歲征權奏罷之議者謂其識體螺化海中有小螺以其味辛謂之辣螺可食至二三月間多化為蟚螖今人有得螯跪半成而尚留殻中者此其證也近青龍鎮於江塗中得蟹螯跪俱脱其行自若初驚為恠及熟烹去殻則將化為蟬矣噫物之變化萬狀固不可究詰今觀蟬之首腹頗與蟹相類誠亦有是但慮驚浴又非予之所親見故附錄之食珍凡糟蟹用茱萸一粒置厴中經歲不沙蟹浪濟鄆居人夜則執火於水濵紛然而集謂之蟹浪酒蟹酒蟹須十二月間作於酒甕間撇清酒不得近糟和鹽浸蟹一宿却取出於厴中去其糞穢重實椒鹽訖疊淨器中取前所浸鹽酒更入少新撇者同煎一沸以别器盛之隔宿候冷傾蟹中須令滿蟚蚎亦可依此法二三月間止用生乾煑酒白蟹秀州華亭縣出於三泖者最佳生於通陂塘者特大故鄉人呼為泖蟹又亭林湖近顧野王宅鄉人亦號為顧亭林於天聖末忽生白蟹即海中所生蠞是也但蠞不生於淡水今忽有因號白蟹瀕江之人以價倍常靡有孑遺止一年而種絶盪浦搖江呉人於港浦間用篙引小舟沉鐵脚網以取之謂之盪浦於江側相對引兩舟中間施網搖小舟徐行謂之搖江上接斷下接於陂塘紀賦詠蟹志見陸龜蒙集中躁外撓兮冠𢃄之狙陸龜䝉賦蟹奴晴上臨湘檻燕婢秋隨過海船皮日休蟹因霜重金膏溢橘為風多玉腦圓同前二螯或把持杜子美亥日饒蝦蟹白樂天病中有人惠海蟹轉寄魯望皮日休紺甲青筐染菭衣島夷初寄北人時離居定有石帆覺失伴惟應海月知族類分明連瑣􅖜瑣􅖜似小蚌有一小蟹在腹中􅖜出求食故淮海之人呼為蟹奴形容好箇是蟚蜞病中無用雙螯處寄與夫君左手持詶襲美見寄海蟹陸龜䝉藥盃應阻蟹螯香却乞江邊採捕郎自是揚雄知郭索太𤣥經云蟹之郭索且非何𦙍敢餦餭何𦙍侈於食味稍欲去其甚者猶有䱇脯糖蟹骨清猶是含春靄沫白還疑帶海霜强作南朝風雅客夜來偷醉早梅傍蟹譜卷下
