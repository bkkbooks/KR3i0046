body:
  text: 蟹譜二卷譜録類三草木禽魚之屬提要臣等謹案蟹譜宋傅肱撰肱字子翼其自署曰怪山陳振孫謂怪山乃越州之飛來山則㑹稽人也其書分上下兩篇前有嘉祐四年自序而下篇貪化一條又引神宗時大臣趙姓者出鎮近輔事而諱其名考之宋史惟神宗熈寧初樞宻使參知政事趙槩嘗出知徐州似即其事則嘉祐當為元祐之訛然書録解題載是序亦作嘉祐四年而趙槩為北宋名臣不容著貪墨聲或刋本神字誤也書中所録皆蟹之故事上篇多採舊文下篇則其所自記詮次頗見雅馴所引唐韻十七條尤足備考証盖其時孫愐原本尚存故肱猶及見之云蟹畧四卷臣等謹案蟹略四巻宋髙似孫撰似孫有剡録已著録是編以傅肱蟹譜徴事大略因别加裒集巻一曰蟹原蟹象卷二曰蟹鄉蟹具蟹品蟹占卷三曰蟹貢蟹饌蟹牒卷四曰蟹雅蟹志賦咏每門之下分條記載多取蟹字為目而系以前人詩句俞文豹吹劍録嘗譏其以林逋草泥行郭索雲木呌釣輈一聨為杜甫詩今檢卷首郭索傳内信然殊為失於詳核又本草圖經蟹生伊洛池澤中一語澤蟹洛蟹條下兩引之亦為複出又白居易詩亥日饒蝦蟹句為傅肱譜中所原引而此書蝦蟹條下乃反遺之其於編次亦小有疎漏特其採摭繁富究為博雅遺篇佚句所載尤多視傅譜終為勝之云乾隆四十六年恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:70e8856ae8b7918cd7facfa5a09df87aad5061147665f4974a2ffa544d2a6d23
