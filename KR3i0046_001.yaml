body:
  text: 蟹譜卷上宋傅肱撰蟹之為物雖非登俎之貴然見於經引於傳著於子史志於隱逸歌詠於詩人雜出於小説皆有意謂焉故因益以今之所見聞次而譜之自總論而列為上下二篇又敘其後聊亦以補博覽者所闕也神宋嘉祐四年冬序總論蟹水蟲也其字從蟲盱鬼反亦曰魚屬故古文從魚作蟹以其外骨則曰介蟲取其橫行目為螃蟹焉骨眼蜩腹䖱腦鱟足其爪類拳丁其􅚺類執鉞匡跪又皆外刺性復多躁或編諸繩縷或投諸笭箵則引聲噀沫必死方已類皆䲊育生於濟鄆者其色紺紫出於江浙者其色青白此舉其所育多者爾凡有水之地不無此味小者謂之蟛蚎中者謂之蟹匡長而鋭者謂之蠞音截甚大者謂之蝤蛑雖皆有佳味獨蟹參於藥論耳明越溪澗石穴中亦出小蟹其色赤而堅俗呼為石蟹與生伊洛者無異厴圓多腴而奪之􅚺臍長多瘠而與之蝦其生於盛夏者無遺穗以自充俗呼為蘆根蟹謂其止食茭蘆根瘠小而味腥至八月則蛻形已蛻而形浸大秋冬之交稻梁已足各腹芒走江俗呼為樂蟹最號肥美由江而納其芒於海中之魁遇冰雪則自伏淤澱不可得矣今人設啖具以案酒者此特為之先置焉江淮間尚推重如此况非所育之地乎何曽食疏𢎞君食橄虞悰飲食亦未必不珍此味也虞悰南史有傳但名存而書亡此為恨耳曰蟛蚎者二月三月之盛出於海塗吳俗猶所嗜尚歲或不至則指目禁煙謂非佳節也今之通泰其類實繁然有同蟛􅒹差大而毛好耕穴田畝中謂之蟛蜞毒不可食晉蔡道明誤食之幾死尤宜慎辨也又多生於陂塘溝港穢雜之地往往因雨則瀕海之家列陳而上填砌緣屋雖驅挮之不去也噫蟹雖微類至於腹芒以朝其魁其得自然之禮歟嗜欲已足捨陂港而之江海其得自然之智歟雖外剛躁而內無他腸其得自然之正歟豈獨以其滋味饜世人之口腹哉故論其略而冠諸二篇之首上篇離象有匡仄行螖蠌走遲蟲孽性躁左持捕鼠不啖郭索蟛蜞誅解系蛙矜龜長侈味瑣􅖜介蟲之孽無腸公子天文食證異名誡嗜兵異集鼠鱟類浦名畫輸芒蛉腹同鼠孽為災玉篇月令圖經琴聲唐韻説文長生食莨斬王攄藥證離象易之離象曰為鱉為蟹為螺為蚌為龜孔頴達云取其剛在外也有匡檀弓曰成人有其兄死而不為衰者聞子臯將為成宰為衰成人曰蠶則績而蟹有匡范則冠而蟬有緌兄則死而子臯為之衰孔頴達云蟹背殼似匡仄行周禮梓人為簨簴别敘小蟲蟹屬以為雕琢鄭康成注云刻畫祭器博庶物也蟲自外骨至胸鳴內有仄行者釋云蟹屬賈公彥疏曰今人謂之螃蟹以其側行者也內郤行者蚓之屬即由延也脰鳴者即蝦蟇也紆行者即蛇也案周禮祭器未有以由延螃蟹蝦蟇及蛇為飾者不知起何法制且經文但云以雕琢耳康成專取為祭器之飾義誠安考螖蠌爾雅釋魚篇云螖蠌小者蟧蟧螺屬見埤蒼或曰即螖也似蟹而小走遲大司樂樂六變注蛤蟹走則遲蟲孽越王勾踐召范蠡曰吾與子謀吳子曰未可也今其稻蟹不遺種其可乎注蟹食稻對曰天應至矣人事未盡也王姑待之性躁荀子勸學篇云蟹六跪而二螯非蛇蟺之穴無所寄託者用心躁也注跪足也螯蟹首上如鉞者序語蟹皆八足此云六者謬文然今觀蟹行後兩小足不著地以其無用所略而不言左持晉春秋畢吏部卓字茂世嘗謂人曰左手持蟹螯右手執酒杯拍浮酒池中足樂一生哉捕鼠淮南子曰使蟹捕鼠必不得不啖虞預會稽典録云吞舟之魚不啖蝦蟹玉篇作蝦長鬚蟲也熊虎之爪不剝狸鼠郭索太玄鋭前一蟹之郭索後蚓黃泉范明叔云一水也所稱泉亦為水所稱蟹五為裸所稱蚓言蟹之與蚓者用心之不一雖有郭索多足之蟹不如無足之蚓者以其用心之一也蟛蜞晉書蔡謨字明道初渡江見蟛蜞大喜曰蟹有八足加以二螯令烹之既食吐下委頓方知非蟹後詣謝尚而説之尚曰卿讀爾雅不熟幾為勸學死誅解系晉解系字少連與趙王倫同討叛羌時倫信用佞人孫秀與系爭軍事更相表奏朝廷知系守正不撓而召倫還系表殺秀以謝氐羌不從後倫秀以宿憾收系兄弟梁王彤救系等倫曰我於水中見蟹且惡之况此人兄弟輕我邪遂害之蛙矜莊子秋水篇公子牟曰子獨不聞夫坎井之蛙乎謂東海之鱉曰吾樂與吾跳梁乎井幹之上入休乎闕甃之崖赴水則接掖持頥蹶泥則沒足滅跗還虷音寒義云井中赤蟲一名蜎蟹與科斗莫吾能若也龜長大戴禮云甲蟲三百六十四神龜為之長蟹亦蟲之一也侈味南史何胤字子季出繼叔父曠所更字胤叔初胤侈於食味前必方丈後稍欲去甚者猶食白魚鱔市演反脯糖蟹以為非見生物擬食蚶蠣使門人議之學生鍾岏曰鱔魚就脯驟見屈伸蟹之將糖躁擾彌甚仁人用意深懷此怛至於車螯蚶蠣眉目內闕慚渾沌之竒獷殼外緘非金人之慎不悴不榮曽草木之不若無馨無臭與瓦鑠其何殊故宜長充庖厨永為口實瑣􅖜郭景純江賦云瑣􅖜腹蟹水母目蝦又松陵集注云瑣􅖜似蚌常有一小蟹在腹中為􅖜出求食蟹或不至􅖜餒死所以淮海人呼為蟹奴介蟲之孽月令章句曰介者甲也謂龜蟹之屬後漢五行志無腸公子抱朴子云山中無腸公子者蟹也天文釋典云十二星宫有巨蟹焉食證孟詵食療本草云蟹雖消食治胃氣理經絡然腹中有毒中之或致死急取大黃紫蘇冬瓜汁解之即差又云蟹目相向者不可食又云以鹽漬之甚有佳味沃以苦酒通利支節去五臟煩悶豫謂亦不可與柿子同食發霍瀉異名中華古今注云蟛蚎小蟹也生海塗中食土一名長卿其一螯偏大者為擁劒一名執火誡嗜混俗頥生論曰凡人常膳之間豬無筋魚無氣雞無髓蟹無腹皆物之稟氣不足者不可多食兵異軍略災篇云地忽生蟹當急遷寨柵不遷將士亡集鼠陶隱居云仙方以黑犬血灌蟹三日燒之諸鼠畢集鱟類郭景純傳山海經云鱟形如惠文冠青黑色十二足長五六尺似蟹雌常負雄而行漁者取之必雙得即吳都賦所謂乘鱟者也吕延濟亦注云似蟹浦名南齊建武四年崔慧景作亂到都下今之金陵不克單馬至蟹浦投漁人太叔榮之榮之故為慧景門人時為蟹浦戍因斬慧景頭納鰌籃中送都下焉畫唐韓晉公滉善畫以張僧繇為之師善狀人物異獸水牛等尤妙於螃蟹輸芒孟詵食療本草云蟹至八月即啖芒兩莖長寸許東嚮至海輸送蟹王之所陶隱居亦云今開蟹腹中猶有海水乃是其證豫謂即陸魯望云執穗以朝其魁者也與夫羔羊跪乳蜂房會衙俱得自然之禮蛉腹唐韻况字逋翁混胎丈人攝魔還精符曰螟蛉之子蝦目蟹腹即即周周兩不相掩此之謂體異而氣同同鼠孽唐陸龜蒙字魯望作稻鼠記引國語曰今吾稻蟹不遺種豈吳人之土鼠與蟹更俟其便而效其力殱其民歟為災晉隱逸傳夏統字仲御會稽永興人也幼孤貧養親以孝睦聞初兄弟每採梠求食星行夜歸或至海邊採螊􅒹以自資養玉篇八足蟹二螯八足􅗶普流反似蟹二足亦見郭璞江賦蜅䗚上方武下布莫反皆蟹也月令季冬行秋令介蟲為妖丑為鱉蟹圖經羅處約新修蘇州圖經鳥獸蟲魚篇蟹居其末琴聲琴譜履霜操有蟹行聲唐韻蟛螖户八反似蟹而小豫謂即今之蟛蚏也一名蟛螖耳􅚣王忽反蛤屬似蟹蟹水蟲也蝤蛑上自秋下莫浮似蟹而大生海邊蠞似蟹生海中豫謂於食品中與苣勝胡麻相宜螯蟹屬􅚺蟹大時也豫謂古今用􅚺跪字通作螯螃螃蟹釋云本蟹云俗加螃字豫案周禮疏推作旁取其橫行今字益蟲乃是俗加陸德明所謂蟲屬要作蟲旁草類皆從兩屮是也然則旁蟹之呼名古矣但不當加蟲字耳豫謂今秀州華亭縣濟村所出甚多小者謂之黃甲越人云和鹽泥養之可踰月蜇魟下音功江蟲也形似蟹可食又音炴􅀈䱺下音孩雄蟹也虷胡安反虷蟹一名蚱蟲擁劒劒蟲形似蟹崔豹古今注折劒一名執火其螯赤謂之執火鰖蟹子也以水反又他果切厴蟹腹下厴於琰反蝑鹽藏蟹事夜切江􅔼寺絶反似蝤蛑生海中􅀢蟲似蟹四足音北説文六足許慎説文云蟹六足二螯者也蛫九毁切唐韻云獸似龜白身赤首胥相居切蟹醢也唐韻從蟲鹽藏之長生陶隱居云仙方投蟹於漆中化為水飲之長生食茛陶隱居云蟹未被霜者甚有毒以其食水茛也音建人或中之不即療則多死至八月腹內有稻芒食之無毒斬王攄晉書劉聰字元明即偽位左都水使者襄陵王攄坐魚蟹不供斬於東市藥證本草云蟹蝑味鹹性寒有毒主胸中邪氣熱結痛喎僻面腫解結散血愈漆瘡養筋益氣取黃以塗久疽瘡無不差者又殺莨菪毒其爪尖主破胞墮胎陳藏器本草云人或斷絶筋骨者取脛中髓及腦與黃微熬納瘡中即自然連續海藥本草云石蟹案廣州記云出南海祇是尋常蟹年深歲久日被水沫相抱因兹化成石蟹每遇海潮即飄出又有一般者入洞穴年深亦成石蟹味鹹寒有毒主消青盲眼浮翳又主眼澀皆細研水飛入藥相佐用以點目蟹譜卷上
